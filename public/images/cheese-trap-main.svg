<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#fff1f1"/>
  <circle cx="340" cy="60" r="85" fill="#d4824b" opacity="0.12"/>
  <!-- Book spine -->
  <rect x="110" y="40" width="25" height="220" rx="3" fill="#8b5a3c"/>
  <!-- Book cover -->
  <rect x="135" y="40" width="155" height="220" rx="3" fill="white" stroke="#333" stroke-width="2"/>
  <!-- Top section red -->
  <rect x="135" y="40" width="155" height="70" fill="#d94a38"/>
  <!-- Title area -->
  <rect x="145" y="55" width="135" height="40" fill="white" opacity="0.9" rx="2"/>
  <text x="212" y="70" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#d94a38" text-anchor="middle">The Cheese</text>
  <text x="212" y="88" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#d94a38" text-anchor="middle">Trap</text>
  <!-- Author text -->
  <text x="212" y="125" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">Neal M. Barnard, MD</text>
  <!-- Center image area -->
  <rect x="145" y="140" width="135" height="85" fill="#fdd835" opacity="0.2"/>
  <!-- Cheese slice illustration -->
  <path d="M170 155 l60 0 l0 50 l-60 0 z" fill="#f4b042" stroke="#8b5a3c" stroke-width="1.5"/>
  <circle cx="185" cy="170" r="4" fill="#d4824b" opacity="0.6"/>
  <circle cx="200" cy="185" r="5" fill="#d4824b" opacity="0.5"/>
  <circle cx="220" cy="175" r="3.5" fill="#d4824b" opacity="0.6"/>
  <!-- Bottom section -->
  <rect x="145" y="225" width="135" height="35" fill="#f5f5f5"/>
  <text x="212" y="241" font-family="Arial,sans-serif" font-size="8" fill="#666" text-anchor="middle">Why Cheese Makes You Addicted</text>
  <text x="212" y="254" font-family="Arial,sans-serif" font-size="8" fill="#666" text-anchor="middle">&amp; How to Enjoy Eating Without It</text>
  <!-- Price -->
  <rect x="248" y="242" width="52" height="22" rx="11" fill="#d94a38"/>
  <text x="274" y="257" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">$18.00</text>
</svg>
