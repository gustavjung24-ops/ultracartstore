  <line x1="122" y1="146" x2="275" y2="146" stroke="#ddd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="122" y1="160" x2="280" y2="160" stroke="#ddd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="122" y1="174" x2="265" y2="174" stroke="#ddd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="122" y1="188" x2="278" y2="188" stroke="#ddd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="122" y1="202" x2="270" y2="202" stroke="#ddd" stroke-width="1.5" stroke-linecap="round"/>
