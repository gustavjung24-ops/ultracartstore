<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#fff8f5"/>
  <circle cx="60" cy="250" r="80" fill="#28afb0" opacity="0.10"/>
  <!-- Book -->
  <rect x="100" y="45" width="200" height="210" rx="5" fill="white" stroke="#0f3744" stroke-width="2.5"/>
  <!-- Spine -->
  <rect x="100" y="45" width="20" height="210" rx="5" fill="#0f3744"/>
  <!-- Book cover design -->
  <rect x="120" y="55" width="170" height="190" fill="#fff5f0"/>
  <!-- Title -->
  <text x="205" y="85" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#0f3744" text-anchor="middle">Ăn lành mạnh</text>
  <text x="205" y="105" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#0f3744" text-anchor="middle">mỗi ngày</text>
  <!-- Food icons -->
  <circle cx="155" cy="140" r="22" fill="#28afb0" opacity="0.15"/>
  <path d="M155 125 q8 0 8 8 q0 8-8 8 q-8 0-8-8 q0-8 8-8m-10 15 l20 0 m-20-3 l20 0" fill="#28afb0" stroke="#28afb0" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Leaf decoration -->
  <ellipse cx="235" cy="145" rx="12" ry="18" fill="#28afb0" opacity="0.3" transform="rotate(-30 235 145)"/>
  <ellipse cx="220" cy="160" rx="10" ry="14" fill="#28afb0" opacity="0.25" transform="rotate(25 220 160)"/>
  <!-- Decorative lines -->
  <line x1="140" y1="190" x2="270" y2="190" stroke="#28afb0" stroke-width="1.5" opacity="0.3"/>
  <line x1="140" y1="210" x2="260" y2="210" stroke="#28afb0" stroke-width="1.5" opacity="0.3"/>
  <!-- Page flip -->
  <polygon points="300,45 300,70 325,45" fill="#e8f7f7" stroke="#0f3744" stroke-width="1"/>
  <!-- Price -->
  <rect x="248" y="242" width="52" height="22" rx="11" fill="#28afb0"/>
  <text x="274" y="257" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">$3.00</text>
</svg>
